server {
    listen 80;
    listen [::]:80;
    server_name api.letslearnandlead.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# Upstream with keepalive connections – avoids new TCP handshake per request
upstream node_backend {
    server localhost:5000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.letslearnandlead.com;

    # SSL Certificate paths
    ssl_certificate /etc/letsencrypt/live/letslearnandlead.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/letslearnandlead.com/privkey.pem;

    # SSL Configuration (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── CORS headers — "always" ensures they are sent even on 4xx/5xx errors ──
    # Without "always", a 413 from nginx has no CORS headers → browser reports
    # a fake "CORS error" instead of the real "413 Content Too Large".
    set $cors_origin "";
    if ($http_origin = "https://letslearnandlead.com")  { set $cors_origin $http_origin; }
    if ($http_origin = "https://www.letslearnandlead.com") { set $cors_origin $http_origin; }

    add_header Access-Control-Allow-Origin      $cors_origin always;
    add_header Access-Control-Allow-Credentials "true"       always;
    add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Device-Id" always;

    # Handle OPTIONS preflight requests directly in nginx (no Node.js hop needed)
    if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true"       always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Content-Type, Authorization, X-Device-Id" always;
        add_header Access-Control-Max-Age           86400        always;
        return 204;
    }

    # Gzip compression for API responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types application/json application/javascript text/plain text/css text/xml;
    gzip_min_length 1024;

    # Increase client body size for image uploads (base64 thumbnails can be large)
    client_max_body_size 50M;

    # Proxy settings
    location / {
        # Proxy to Node.js backend (via keepalive upstream)
        proxy_pass http://node_backend;

        # Proxy headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Access and error logs
    access_log /var/log/nginx/api-letslearnandlead-access.log;
    error_log /var/log/nginx/api-letslearnandlead-error.log;
}
