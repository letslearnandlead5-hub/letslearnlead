name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Allows manual trigger from GitHub Actions tab

jobs:
  deploy:
    name: Deploy to Production VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚀 Deploy to VPS via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        script: |
          echo "🚀 Starting deployment..."
          # Actual code location on server (confirmed via SSH)
          cd ~/letslearnlead

          # Pull latest code
          echo "📥 Pulling from GitHub..."
          git pull origin main

          # ── Nginx config sync ──────────────────────────────────────────────
          # Sync the nginx site config (confirmed path from server)
          echo "🔧 Syncing Nginx config..."
          cp nginx-api.conf /etc/nginx/sites-available/letslearnandlead.com.conf

          # Ensure global http block has the 50MB upload limit
          # (idempotent: only adds if not already present)
          if ! grep -q "client_max_body_size" /etc/nginx/nginx.conf; then
            sed -i '/http {/a\\tclient_max_body_size 50M;' /etc/nginx/nginx.conf
            echo "✅ Added client_max_body_size to nginx.conf"
          else
            echo "✅ client_max_body_size already set in nginx.conf"
          fi

          # Validate and reload (zero-downtime)
          echo "✅ Testing Nginx config syntax..."
          nginx -t
          echo "🔄 Reloading Nginx..."
          systemctl reload nginx
          # ──────────────────────────────────────────────────────────────────

          # Build frontend
          echo "📦 Building frontend..."
          npm install
          npm run build

          # Build backend
          echo "🔨 Building backend..."
          cd server
          npm install --production
          npm run build
          cd ..

          # Restart PM2 process (name from ecosystem.config.cjs)
          echo "🔄 Restarting server..."
          pm2 restart letslearn

          echo "✅ Deployment complete!"
          pm2 status
